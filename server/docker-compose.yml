version: "3.9"

services:
  dev-sprint-postgres:
    image: postgres:16-alpine
    container_name: dev-sprint-postgres
    environment:
      POSTGRES_USER: dhongorsho
      POSTGRES_PASSWORD: dhongorsho123
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"       # different host port to avoid conflicts
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./Database:/docker-entrypoint-initdb.d

  dev-sprint-redis:
    image: redis:7-alpine
    container_name: dev-sprint-redis
    ports:
      - "6380:6379"       # different host port
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  gateway:
    build: ./Gateway
    container_name: dev-sprint-gateway
    depends_on:
      - dev-sprint-postgres
      - dev-sprint-redis
    environment:
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4001
      JWT_SECRET: "dhongorsho"
      IDENTITY_SERVICE_URL: "http://dev-sprint-identity:4002"
      INVENTORY_SERVICE_URL: "http://dev-sprint-inventory:4003"
    ports:
      - "8001:4001"
    restart: always

  identity:
    build: ./Identity
    container_name: dev-sprint-identity
    depends_on:
      - dev-sprint-postgres
      - dev-sprint-redis
    environment:
      DATABASE_URL: "postgresql://dhongorsho:dhongorsho123@dev-sprint-postgres:5432/user_db?schema=public"
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4002
      JWT_SECRET: "dhongorsho"
    ports:
      - "8002:4002"
    restart: always

  inventory:
    build: ./Inventory
    container_name: dev-sprint-inventory
    depends_on:
      - dev-sprint-postgres
      - dev-sprint-redis
    environment:
      DATABASE_URL: "postgresql://dhongorsho:dhongorsho123@dev-sprint-postgres:5432/inventory_db?schema=public"
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4003
      RABBITMQ_URL: "amqp://IUT_Dhongorsho:Dhongorsho123@rabbitmq:5672"  
    ports:
      - "8003:4003"
    restart: always

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_service
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: "IUT_Dhongorsho"
      RABBITMQ_DEFAULT_PASS: "Dhongorsho123"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always


volumes:
  user-db-data:
  redis-data:
  rabbitmq_data: